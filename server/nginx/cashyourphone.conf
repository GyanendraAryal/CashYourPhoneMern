# Example Nginx config (adapt domains/paths)
# - Serves built client at /
# - Serves built admin at /admin/
# - Proxies API at /api/
#
# client build: /var/www/cashyourphone/client/dist
# admin build:  /var/www/cashyourphone/admin/dist
# api:          http://127.0.0.1:4000

server {
  listen 80;
  server_name example.com www.example.com;

  # After TLS is set up, redirect HTTP -> HTTPS:
  # return 301 https://$host$request_uri;

  # Client app
  root /var/www/cashyourphone/client/dist;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Admin app
  location /admin/ {
    alias /var/www/cashyourphone/admin/dist/;
    try_files $uri $uri/ /admin/index.html;
  }

  # API
  location /api/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  add_header X-Content-Type-Options nosniff;
  add_header Referrer-Policy strict-origin-when-cross-origin;
}
